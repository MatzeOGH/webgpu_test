<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Aplenite</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                overflow: hidden;
                background: #000;
            }
            canvas {
                display: block;
                touch-action: none;
            }

            #joystick-base {
                position: fixed;
                bottom: 24px;
                right: 24px;
                width: 120px;
                height: 120px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.1);
                border: 2px solid rgba(255, 255, 255, 0.35);
                touch-action: none;
                z-index: 100;
            }
            #joystick-knob {
                width: 50px;
                height: 50px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.4);
                border: 2px solid rgba(255, 255, 255, 0.7);
                pointer-events: none;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            #touch-controls {
                position: fixed;
                bottom: 24px;
                left: 24px;
                display: grid;
                grid-template-columns: repeat(3, 64px);
                grid-template-rows: repeat(2, 64px);
                gap: 6px;
                z-index: 100;
            }
            .dpad-btn {
                background: rgba(255, 255, 255, 0.2);
                border: 2px solid rgba(255, 255, 255, 0.45);
                border-radius: 10px;
                color: #fff;
                font-size: 22px;
                font-weight: bold;
                font-family: monospace;
                touch-action: none;
                user-select: none;
                -webkit-user-select: none;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                outline: none;
                transition: background 0.05s;
            }
            .dpad-btn:active,
            .dpad-btn.pressed {
                background: rgba(255, 255, 255, 0.45);
            }
            .dpad-empty {
                pointer-events: none;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas"></canvas>

        <!-- Thumbstick (bottom-right) -->
        <div id="joystick-base">
            <div id="joystick-knob"></div>
        </div>

        <!-- WASD d-pad overlay (bottom-left): row1=[_,W,_]  row2=[A,S,D] -->
        <div id="touch-controls">
            <div class="dpad-empty"></div>
            <button id="btn-w" class="dpad-btn" tabindex="-1">W</button>
            <div class="dpad-empty"></div>
            <button id="btn-a" class="dpad-btn" tabindex="-1">A</button>
            <button id="btn-s" class="dpad-btn" tabindex="-1">S</button>
            <button id="btn-d" class="dpad-btn" tabindex="-1">D</button>
        </div>

        <script>
            // Canvas resize
            (function () {
                var c = document.getElementById("canvas");
                function resize() {
                    c.width = window.innerWidth;
                    c.height = window.innerHeight;
                }
                resize();
                window.addEventListener("resize", resize);
            })();

            // Thumbstick — calls exported web_set_look_joystick(x, y) with -1..1 axes
            (function () {
                var base = document.getElementById("joystick-base");
                var knob = document.getElementById("joystick-knob");
                var touchId = null;
                var baseCX = 0,
                    baseCY = 0;
                var MAX_R = 35; // px — (120 - 50) / 2

                function setJoy(nx, ny) {
                    knob.style.transform =
                        "translate(calc(-50% + " +
                        nx * MAX_R +
                        "px), calc(-50% + " +
                        ny * MAX_R +
                        "px))";
                    if (window.setJoystick) window.setJoystick(nx, ny);
                }

                base.addEventListener(
                    "touchstart",
                    function (e) {
                        e.preventDefault();
                        if (touchId !== null) return;
                        var t = e.changedTouches[0];
                        touchId = t.identifier;
                        var r = base.getBoundingClientRect();
                        baseCX = r.left + r.width * 0.5;
                        baseCY = r.top + r.height * 0.5;
                        knob.style.transition = "none";
                    },
                    { passive: false },
                );

                document.addEventListener(
                    "touchmove",
                    function (e) {
                        if (touchId === null) return;
                        for (var i = 0; i < e.changedTouches.length; i++) {
                            var t = e.changedTouches[i];
                            if (t.identifier !== touchId) continue;
                            var dx = t.clientX - baseCX,
                                dy = t.clientY - baseCY;
                            var dist = Math.sqrt(dx * dx + dy * dy);
                            var nx = 0,
                                ny = 0;
                            if (dist > 1) {
                                var clamped = Math.min(dist, MAX_R);
                                nx = (dx / dist) * (clamped / MAX_R);
                                ny = (dy / dist) * (clamped / MAX_R);
                            }
                            setJoy(nx, ny);
                            e.preventDefault();
                            break;
                        }
                    },
                    { passive: false },
                );

                function onEnd(e) {
                    if (touchId === null) return;
                    for (var i = 0; i < e.changedTouches.length; i++) {
                        if (e.changedTouches[i].identifier !== touchId)
                            continue;
                        touchId = null;
                        knob.style.transition = "transform 0.1s ease-out";
                        setJoy(0, 0);
                        break;
                    }
                }
                document.addEventListener("touchend", onEnd, {
                    passive: false,
                });
                document.addEventListener("touchcancel", onEnd, {
                    passive: false,
                });
            })();

            // WASD buttons — dispatch synthetic KeyboardEvents so the existing C++ handlers pick them up
            (function () {
                function fakeKey(code, type) {
                    window.dispatchEvent(
                        new KeyboardEvent(type, {
                            code: code,
                            bubbles: true,
                            cancelable: true,
                        }),
                    );
                }
                function bindBtn(id, code) {
                    var el = document.getElementById(id);
                    el.addEventListener(
                        "touchstart",
                        function (e) {
                            e.preventDefault();
                            el.classList.add("pressed");
                            fakeKey(code, "keydown");
                        },
                        { passive: false },
                    );
                    el.addEventListener(
                        "touchend",
                        function (e) {
                            e.preventDefault();
                            el.classList.remove("pressed");
                            fakeKey(code, "keyup");
                        },
                        { passive: false },
                    );
                    el.addEventListener(
                        "touchcancel",
                        function (e) {
                            e.preventDefault();
                            el.classList.remove("pressed");
                            fakeKey(code, "keyup");
                        },
                        { passive: false },
                    );
                    // Also support mouse (desktop testing)
                    el.addEventListener("mousedown", function () {
                        fakeKey(code, "keydown");
                    });
                    el.addEventListener("mouseup", function () {
                        fakeKey(code, "keyup");
                    });
                    el.addEventListener("mouseleave", function () {
                        fakeKey(code, "keyup");
                    });
                }
                bindBtn("btn-w", "KeyW");
                bindBtn("btn-a", "KeyA");
                bindBtn("btn-s", "KeyS");
                bindBtn("btn-d", "KeyD");
            })();

            // prevent main from stating too early on mobile devices
            var Module = {
                // Ensure correct file loading (important on GitHub Pages + mobile)
                locateFile: function (path) {
                    return new URL(path, window.location.href).toString();
                },

                // Prevent main() from running too early
                onRuntimeInitialized: function () {
                    Module._main();
                },
            };
        </script>

        {{{ SCRIPT }}}
    </body>
</html>
