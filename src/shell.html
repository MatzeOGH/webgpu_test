<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Aplenite</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                overflow: hidden;
                background: #000;
            }
            canvas {
                display: block;
                touch-action: none;
            }

            #joystick-base {
                position: fixed;
                bottom: 24px;
                right: 24px;
                width: 120px;
                height: 120px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.1);
                border: 2px solid rgba(255, 255, 255, 0.35);
                touch-action: none;
                z-index: 100;
                display: none;
            }
            #joystick-knob {
                width: 50px;
                height: 50px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.4);
                border: 2px solid rgba(255, 255, 255, 0.7);
                pointer-events: none;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            #move-joystick-base {
                position: fixed;
                bottom: 24px;
                left: 24px;
                width: 120px;
                height: 120px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.1);
                border: 2px solid rgba(255, 255, 255, 0.35);
                touch-action: none;
                z-index: 100;
                display: none;
            }

            #fullscreen-btn {
                position: fixed;
                top: 16px;
                right: 16px;
                width: 44px;
                height: 44px;
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.1);
                border: 2px solid rgba(255, 255, 255, 0.35);
                color: rgba(255, 255, 255, 0.85);
                font: 20px/1 sans-serif;
                display: none;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                user-select: none;
                -webkit-user-select: none;
                -webkit-tap-highlight-color: transparent;
                touch-action: manipulation;
                z-index: 100;
                padding: 0;
            }
            #fullscreen-btn:active {
                background: rgba(255, 255, 255, 0.25);
            }

            @media (pointer: coarse) {
                #joystick-base,
                #move-joystick-base {
                    display: block;
                }
                #fullscreen-btn {
                    display: flex;
                }
            }
            #move-joystick-knob {
                width: 50px;
                height: 50px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.4);
                border: 2px solid rgba(255, 255, 255, 0.7);
                pointer-events: none;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }

            #loading-screen {
                position: fixed;
                inset: 0;
                background: #000;
                color: #fff;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 999;
                font-family: sans-serif;
            }

            #loading-bar {
                width: 200px;
                height: 10px;
                border: 1px solid rgba(255, 255, 255, 0.4);
                margin-top: 10px;
            }

            #loading-progress {
                height: 100%;
                width: 0%;
                background: white;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas"></canvas>

        <!-- Loading widget -->
        <div id="loading-screen">
            <div id="loading-text">Loading…</div>
            <div id="loading-bar">
                <div id="loading-progress"></div>
            </div>
        </div>

        <!-- Thumbstick (bottom-right) -->
        <div id="joystick-base">
            <div id="joystick-knob"></div>
        </div>

        <!-- Move joystick (bottom-left) -->
        <div id="move-joystick-base">
            <div id="move-joystick-knob"></div>
        </div>

        <!-- Fullscreen toggle (mobile only, top-right) -->
        <button
            id="fullscreen-btn"
            type="button"
            aria-label="Toggle fullscreen"
        >
            ⛶
        </button>

        <script>
            // Canvas resize
            (function () {
                var c = document.getElementById("canvas");
                function resize() {
                    var dpr = Math.min(window.devicePixelRatio || 1, 2);
                    var w = window.innerWidth;
                    var h = window.innerHeight;
                    c.style.width = w + "px";
                    c.style.height = h + "px";
                    c.width = Math.floor(w * dpr);
                    c.height = Math.floor(h * dpr);
                }
                resize();
                window.addEventListener("resize", resize);
            })();

            // Thumbstick — calls exported web_set_look_joystick(x, y) with -1..1 axes
            (function () {
                var base = document.getElementById("joystick-base");
                var knob = document.getElementById("joystick-knob");
                var touchId = null;
                var baseCX = 0,
                    baseCY = 0;
                var MAX_R = 35; // px — (120 - 50) / 2

                function setJoy(nx, ny) {
                    knob.style.transform =
                        "translate(calc(-50% + " +
                        nx * MAX_R +
                        "px), calc(-50% + " +
                        ny * MAX_R +
                        "px))";
                    if (window.setJoystick) window.setJoystick(nx, ny);
                }

                base.addEventListener(
                    "touchstart",
                    function (e) {
                        e.preventDefault();
                        if (touchId !== null) return;
                        var t = e.changedTouches[0];
                        touchId = t.identifier;
                        var r = base.getBoundingClientRect();
                        baseCX = r.left + r.width * 0.5;
                        baseCY = r.top + r.height * 0.5;
                        knob.style.transition = "none";
                    },
                    { passive: false },
                );

                document.addEventListener(
                    "touchmove",
                    function (e) {
                        if (touchId === null) return;
                        for (var i = 0; i < e.changedTouches.length; i++) {
                            var t = e.changedTouches[i];
                            if (t.identifier !== touchId) continue;
                            var dx = t.clientX - baseCX,
                                dy = t.clientY - baseCY;
                            var dist = Math.sqrt(dx * dx + dy * dy);
                            var nx = 0,
                                ny = 0;
                            if (dist > 1) {
                                var clamped = Math.min(dist, MAX_R);
                                nx = (dx / dist) * (clamped / MAX_R);
                                ny = (dy / dist) * (clamped / MAX_R);
                            }
                            setJoy(nx, ny);
                            e.preventDefault();
                            break;
                        }
                    },
                    { passive: false },
                );

                function onEnd(e) {
                    if (touchId === null) return;
                    for (var i = 0; i < e.changedTouches.length; i++) {
                        if (e.changedTouches[i].identifier !== touchId)
                            continue;
                        touchId = null;
                        knob.style.transition = "transform 0.1s ease-out";
                        setJoy(0, 0);
                        break;
                    }
                }
                document.addEventListener("touchend", onEnd, {
                    passive: false,
                });
                document.addEventListener("touchcancel", onEnd, {
                    passive: false,
                });
            })();

            // Move joystick (bottom-left) — calls window.setMoveJoystick(nx, ny)
            (function () {
                var base = document.getElementById("move-joystick-base");
                var knob = document.getElementById("move-joystick-knob");
                var touchId = null;
                var baseCX = 0,
                    baseCY = 0;
                var MAX_R = 35;

                function setJoy(nx, ny) {
                    knob.style.transform =
                        "translate(calc(-50% + " +
                        nx * MAX_R +
                        "px), calc(-50% + " +
                        ny * MAX_R +
                        "px))";
                    if (window.setMoveJoystick) window.setMoveJoystick(nx, ny);
                }

                base.addEventListener(
                    "touchstart",
                    function (e) {
                        e.preventDefault();
                        if (touchId !== null) return;
                        var t = e.changedTouches[0];
                        touchId = t.identifier;
                        var r = base.getBoundingClientRect();
                        baseCX = r.left + r.width * 0.5;
                        baseCY = r.top + r.height * 0.5;
                        knob.style.transition = "none";
                    },
                    { passive: false },
                );

                document.addEventListener(
                    "touchmove",
                    function (e) {
                        if (touchId === null) return;
                        for (var i = 0; i < e.changedTouches.length; i++) {
                            var t = e.changedTouches[i];
                            if (t.identifier !== touchId) continue;
                            var dx = t.clientX - baseCX,
                                dy = t.clientY - baseCY;
                            var dist = Math.sqrt(dx * dx + dy * dy);
                            var nx = 0,
                                ny = 0;
                            if (dist > 1) {
                                var clamped = Math.min(dist, MAX_R);
                                nx = (dx / dist) * (clamped / MAX_R);
                                ny = (dy / dist) * (clamped / MAX_R);
                            }
                            setJoy(nx, ny);
                            e.preventDefault();
                            break;
                        }
                    },
                    { passive: false },
                );

                function onEnd(e) {
                    if (touchId === null) return;
                    for (var i = 0; i < e.changedTouches.length; i++) {
                        if (e.changedTouches[i].identifier !== touchId)
                            continue;
                        touchId = null;
                        knob.style.transition = "transform 0.1s ease-out";
                        setJoy(0, 0);
                        break;
                    }
                }
                document.addEventListener("touchend", onEnd, {
                    passive: false,
                });
                document.addEventListener("touchcancel", onEnd, {
                    passive: false,
                });
            })();

            // Fullscreen toggle (mobile)
            (function () {
                var btn = document.getElementById("fullscreen-btn");
                if (!btn) return;

                var docEl = document.documentElement;
                var canRequest =
                    docEl.requestFullscreen ||
                    docEl.webkitRequestFullscreen ||
                    docEl.webkitRequestFullScreen ||
                    docEl.msRequestFullscreen;

                // iOS iPhone Safari lacks Fullscreen API entirely — hide button there.
                if (!canRequest) {
                    btn.style.display = "none";
                    return;
                }

                function isFs() {
                    return !!(
                        document.fullscreenElement ||
                        document.webkitFullscreenElement ||
                        document.webkitCurrentFullScreenElement ||
                        document.msFullscreenElement
                    );
                }

                function enter() {
                    var fn =
                        docEl.requestFullscreen ||
                        docEl.webkitRequestFullscreen ||
                        docEl.webkitRequestFullScreen ||
                        docEl.msRequestFullscreen;
                    try {
                        var p = fn.call(docEl, { navigationUI: "hide" });
                        if (p && p.catch) p.catch(function () {});
                    } catch (_) {
                        try {
                            fn.call(docEl);
                        } catch (_) {}
                    }
                }

                function exit() {
                    var fn =
                        document.exitFullscreen ||
                        document.webkitExitFullscreen ||
                        document.webkitCancelFullScreen ||
                        document.msExitFullscreen;
                    if (fn) {
                        try {
                            var p = fn.call(document);
                            if (p && p.catch) p.catch(function () {});
                        } catch (_) {}
                    }
                }

                function toggle(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    if (isFs()) exit();
                    else enter();
                }

                // Use both touchend (fast on mobile) and click (desktop fallback /
                // accessibility). Guard against double-fire via a small lockout.
                var lock = 0;
                btn.addEventListener(
                    "touchend",
                    function (e) {
                        lock = Date.now();
                        toggle(e);
                    },
                    { passive: false },
                );
                btn.addEventListener("click", function (e) {
                    if (Date.now() - lock < 500) {
                        e.preventDefault();
                        return;
                    }
                    toggle(e);
                });

                // Update icon on state change.
                function syncIcon() {
                    btn.textContent = isFs() ? "✕" : "⛶";
                }
                document.addEventListener("fullscreenchange", syncIcon);
                document.addEventListener("webkitfullscreenchange", syncIcon);
                document.addEventListener("msfullscreenchange", syncIcon);
            })();

            var lastProgress = 0;

            // prevent main from stating too early on mobile devices
            var Module = {
                locateFile: function (path) {
                    return new URL(path, window.location.href).toString();
                },

                setStatus: function (text) {
                    var el = document.getElementById("loading-text");
                    var bar = document.getElementById("loading-progress");

                    if (!text) return;

                    var percentText = text;

                    // Extract (loaded/total)
                    var match = text.match(/\((\d+)\/(\d+)\)/);
                    if (match) {
                        var loaded = parseInt(match[1], 10);
                        var total = parseInt(match[2], 10);

                        if (total > 0) {
                            var progress = loaded / total;

                            // prevent going backwards
                            progress = Math.max(progress, lastProgress);
                            lastProgress = progress;

                            var percent = Math.round(progress * 100);

                            // Update bar
                            if (bar) bar.style.width = percent + "%";

                            // Replace text with clean percentage
                            percentText = "Loading " + percent + "%";
                        }
                    }

                    if (el) el.textContent = percentText;
                },

                monitorRunDependencies: function (left) {
                    Module.totalDependencies = Math.max(
                        Module.totalDependencies || 0,
                        left,
                    );
                },

                onRuntimeInitialized: function () {
                    var screen = document.getElementById("loading-screen");
                    if (screen) {
                        screen.style.opacity = "0";
                        setTimeout(() => screen.remove(), 300);
                    }

                    Module._main();
                },
            };
        </script>

        {{{ SCRIPT }}}
    </body>
</html>
