<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>RenderGraph</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                overflow: hidden;
                background: #000;
            }
            canvas {
                display: block;
                touch-action: none;
                outline: none;
            }
            #loading-screen {
                position: fixed;
                inset: 0;
                background: #000;
                color: #fff;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 999;
                font-family: sans-serif;
                transition: opacity 0.3s ease;
            }
            #loading-bar {
                width: 200px;
                height: 10px;
                border: 1px solid rgba(255, 255, 255, 0.4);
                margin-top: 10px;
            }
            #loading-progress {
                height: 100%;
                width: 0%;
                background: white;
            }
        </style>
    </head>
    <body>
        <!-- SDL3 (built from source for wasm) binds its window to this canvas; the WebGPU surface is
             created from the same "#canvas" selector. See src/RenderGraph_main.cpp (web driver). -->
        <canvas id="canvas" tabindex="0"></canvas>

        <div id="loading-screen">
            <div id="loading-text">Loading…</div>
            <div id="loading-bar"><div id="loading-progress"></div></div>
        </div>

        <script>
            // Keep the canvas backing store matched to the window (capped DPR). The C++ resize callback
            // (emscripten_set_resize_callback) reads this size back and reconfigures the WebGPU surface.
            (function () {
                var c = document.getElementById("canvas");
                function resize() {
                    var dpr = Math.min(window.devicePixelRatio || 1, 2);
                    var w = window.innerWidth,
                        h = window.innerHeight;
                    c.style.width = w + "px";
                    c.style.height = h + "px";
                    c.width = Math.floor(w * dpr);
                    c.height = Math.floor(h * dpr);
                }
                resize();
                window.addEventListener("resize", resize);
            })();

            var lastProgress = 0;
            var Module = {
                canvas: document.getElementById("canvas"),
                locateFile: function (path) {
                    return new URL(path, window.location.href).toString();
                },
                setStatus: function (text) {
                    var el = document.getElementById("loading-text");
                    var bar = document.getElementById("loading-progress");
                    if (!text) return;
                    var percentText = text;
                    var match = text.match(/\((\d+)\/(\d+)\)/);
                    if (match) {
                        var total = parseInt(match[2], 10);
                        if (total > 0) {
                            var progress = parseInt(match[1], 10) / total;
                            progress = Math.max(progress, lastProgress);
                            lastProgress = progress;
                            var percent = Math.round(progress * 100);
                            if (bar) bar.style.width = percent + "%";
                            percentText = "Loading " + percent + "%";
                        }
                    }
                    if (el) el.textContent = percentText;
                },
                monitorRunDependencies: function (left) {
                    Module.totalDependencies = Math.max(
                        Module.totalDependencies || 0,
                        left,
                    );
                },
                onRuntimeInitialized: function () {
                    // main() runs automatically (INVOKE_RUN is left at its default), then kicks off async
                    // device acquisition + the requestAnimationFrame loop. Just clear the splash here.
                    var screen = document.getElementById("loading-screen");
                    if (screen) {
                        screen.style.opacity = "0";
                        setTimeout(function () {
                            screen.remove();
                        }, 300);
                    }
                    document.getElementById("canvas").focus();
                },
            };
        </script>

        {{{ SCRIPT }}}
    </body>
</html>
