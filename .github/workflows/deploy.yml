name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main", "render-graph"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Emscripten SDK
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: "latest"
          actions-cache-folder: "emsdk-cache"

      - name: Cache CMake FetchContent deps
        uses: actions/cache@v4
        with:
          path: build-web/_deps
          key: cmake-deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: cmake-deps-${{ runner.os }}-

      - name: Configure
        run: |
          emcmake cmake -B build-web -S . \
            -DCMAKE_BUILD_TYPE=Release \
            -DFETCHCONTENT_UPDATES_DISCONNECTED=ON

      # Only the RenderGraph web target (rg) -> build-web/rendergraph/index.html.
      # The clustered renderer (app) is intentionally not built or deployed.
      - name: Build
        run: cmake --build build-web --target rg --parallel

      # Site root redirects to /rendergraph/ (that's where the RenderGraph app lives).
      - name: Root redirect to /rendergraph
        run: |
          cat > build-web/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <title>RenderGraph</title>
          <meta http-equiv="refresh" content="0; url=./rendergraph/">
          <link rel="canonical" href="./rendergraph/">
          <p>Redirecting to <a href="./rendergraph/">/rendergraph/</a>…</p>
          EOF

      - name: Add .nojekyll
        run: touch build-web/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build-web/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
